name: Build and push images

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build API image
        run: docker build -t ghcr.io/${{ github.repository_owner }}/lab02-api:latest ./api

      - name: Push API image
        run: docker push ghcr.io/${{ github.repository_owner }}/lab02-api:latest

      - name: Build frontend image
        run: docker build -t ghcr.io/${{ github.repository_owner }}/lab02-frontend:latest ./frontend

      - name: Push frontend image
        run: docker push ghcr.io/${{ github.repository_owner }}/lab02-frontend:latest
